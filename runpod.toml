# RunPod Configuration for Kimodo
# NVIDIA's Human Motion Generation Model

name = "kimodo-motion-gen"
vidia_driver = "535"

# Minimum 17GB VRAM for full GPU mode
# With TEXT_ENCODER_DEVICE=cpu, works on cards with <16GB
# Recommended: NVIDIA RTX 3090, RTX 4090, or NVIDIA A100
gpu = "NVIDIA-RTX-4090-24GB"

# Python 3.10 environment
python_version = "3.10"

# Container startup
# This runs the Gradio interactive demo
container_start_command = '''
bash /workspace/start.sh
'''

# Environment variables
env = [
    { 
        name = "HF_TOKEN", 
        description = "HuggingFace token for Llama 3 access (REQUIRED). Get at: huggingface.co/settings/tokens", 
        secret = true 
    },
    { 
        name = "TEXT_ENCODER_DEVICE", 
        description = "Device for text encoder: cuda or cpu (use cpu if VRAM < 16GB)", 
        default = "cuda" 
    },
    { 
        name = "SERVER_PORT", 
        description = "Demo server port", 
        default = "7860" 
    },
]

# Port forwards
port_forward = [7860]

# Health check
health_check_file = "/workspace/.health_check"

# Persistent storage for HuggingFace cache
# Uncomment and adjust if you want persistent model cache:
# volume_mounts = { "/path/to/hf-cache" = "/workspace/.cache/huggingface" }
